# Production stack for EC2 — images from ECR, secrets from SSM (via .env.prod)
# Traefik on port 80 routes by path. Optional HTTPS: see docker-compose.https.yml + docs/HTTPS_SETUP.md

services:
  backend:
    image: ${ECR_REGISTRY}/garbo-backend:${BACKEND_TAG:-latest}
    env_file:
      - .env.prod
    environment:
      SERVER_PORT: "8081"
      SPRING_PROFILES_ACTIVE: prod
    expose:
      - "8081"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 2g
    labels:
      - traefik.enable=true
      - traefik.http.routers.garbo-backend.rule=PathPrefix(`/api`) || PathPrefix(`/ws`) || PathPrefix(`/ws-stomp`) || PathPrefix(`/actuator`)
      - traefik.http.routers.garbo-backend.entrypoints=web
      - traefik.http.routers.garbo-backend.priority=100
      - traefik.http.services.garbo-backend.loadbalancer.server.port=8081
    restart: unless-stopped

  frontend:
    image: ${ECR_REGISTRY}/garbo-frontend:${FRONTEND_TAG:-latest}
    expose:
      - "3000"
    depends_on:
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1g
    labels:
      - traefik.enable=true
      - traefik.http.routers.garbo-frontend.rule=PathPrefix(`/`)
      - traefik.http.routers.garbo-frontend.entrypoints=web
      - traefik.http.routers.garbo-frontend.priority=1
      - traefik.http.services.garbo-frontend.loadbalancer.server.port=3000
    restart: unless-stopped

  traefik:
    image: traefik:v3.6
    command:
      - --api.dashboard=false
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
    ports:
      - "80:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: garbo-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    expose:
      - "9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.1
    container_name: garbo-grafana
    env_file:
      - .env.prod
    environment:
      - GF_SERVER_ROOT_URL=%(protocol)s://%(domain)s:%(http_port)s/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    volumes:
      - grafana-data:/var/lib/grafana
    expose:
      - "3000"
    labels:
      - traefik.enable=true
      - traefik.http.routers.grafana.rule=PathPrefix(`/grafana`)
      - traefik.http.routers.grafana.entrypoints=web
      - traefik.http.services.grafana.loadbalancer.server.port=3000
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:v1.7.0
    container_name: garbo-node-exporter
    volumes:
      - /:/host:ro,rslave
    command:
      - '--path.rootfs=/host'
    expose:
      - "9100"
    restart: unless-stopped

volumes:
  prometheus-data:
  grafana-data:
